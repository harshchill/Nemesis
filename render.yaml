services:
  - type: web
    name: pr-review-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn webhook:app
    envVars:
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_PRIVATE_KEY_PATH
        sync: false
      - key: GROQ_API_KEY
        sync: false